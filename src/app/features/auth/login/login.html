<div class="container">

  <h1>Login</h1>

  <p class="error-text">{{errorMessage}}</p> 

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button
    (click)="login()"
    [disabled]="loading"
    [style.opacity]="loading ? '0.6' : '1'"
  >
    Login
  </button>

  <p>
    Don't have an account?
    <a routerLink="/register">Register</a>
  </p>

</div>
