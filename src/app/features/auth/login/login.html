<div class="container">

  <h1>Login</h1>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="login()">
    Login
  </button>

  <p>
    Don't have an account?
    <a routerLink="/register">Register</a>
  </p>

</div>
