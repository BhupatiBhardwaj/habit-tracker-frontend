<div class="container">

  <h1>Register</h1>

  <input
    type="text"
    placeholder="Name"
    [(ngModel)]="name"
  />

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="register()">
    Register
  </button>

  <p>
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>

</div>
