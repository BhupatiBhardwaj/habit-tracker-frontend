<div class="container">

  <h1>Register</h1>

  <p class="error-text">{{errorMessage}}</p>

  <input
    type="text"
    placeholder="Name"
    [(ngModel)]="name"
  />

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button
    (click)="register()"
    [disabled]="loading"
    [style.opacity]="loading ? '0.6' : '1'"
  >
    {{ loading ? 'Registering...' : 'Register' }}
  </button>

  <p>
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>

</div>
